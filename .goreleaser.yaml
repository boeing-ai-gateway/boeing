version: 2

project_name: "boeing"

builds:
  - id: build-darwin
    main: .
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X "github.com/boeing-ai-gateway/boeing/pkg/version.Tag=v{{ .Version }}"
    hooks:
      post:
        - cmd: quill sign-and-notarize "{{ .Path }}" --dry-run={{ .IsSnapshot }} --ad-hoc={{ .IsSnapshot }} -vv
          env:
            - QUILL_LOG_FILE=/tmp/quill-{{ .Target }}.log

  - id: build-other
    main: .
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -X "github.com/boeing-ai-gateway/boeing/pkg/version.Tag=v{{ .Version }}"

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

release:
  github:
    owner: "boeing-ai-gateway"
    name: "boeing"
  make_latest: false
  prerelease: auto

brews:
  - name: boeing
    description: "Boeing CLI"
    install: |
      bin.install "boeing"
    homepage: "https://github.com/boeing-ai-gateway/boeing"
    skip_upload: auto
    directory: "Formula"
    repository:
      owner: boeing-ai-gateway
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
