# replicaCount -- The number of Boeing server instances to run
replicaCount: 1

dev:
  # dev.useEmbeddedDb -- For development/testing use only, enables the use of an postgres database embedded in the boeing container. Do not use in production.
  useEmbeddedDb: false

image:
  # image.repository -- The name of the docker repository for Boeing. `ghcr.io/boeing-ai-gateway/boeing` for open-source or `ghcr.io/boeing-ai-gateway/boeing-enterprise` for enterprise.
  # Please note that for enterprise you will need to set an `imagePullSecret`
  repository: ghcr.io/boeing-ai-gateway/boeing
  # image.tag -- The docker tag to pull for boeing. If blank, will default to the chart appVersion
  tag: ""
  # image.pullPolicy -- Kubernetes image pullPolicy to use for Boeing
  pullPolicy: IfNotPresent

# imagePullSecrets -- Kubernetes secrets used to pull the Boeing server image.
# For private MCP server images, see mcpImagePullSecrets below.
# Expects a list of secret objects
# `imagePullSecrets:[{"name": "fooBar"}]`
imagePullSecrets: []

# updateStrategy -- Configures what update strategy to use for the deployment (Recreate or RollingUpdate)
updateStrategy: "RollingUpdate"

# Additional labels that should be applied to all resources
additionalLabels: {}
  # app: boeing

# -- Extra pod annotations to add.
podAnnotations: {}

service:
  # service.type -- Type of Kubernetes service to create
  type: ClusterIP
  # service.port -- Port for the Kubernetes service to expose
  port: 80
  # service.annotations -- Extra annotations to add to service object
  annotations: {}
  # service.spec -- Any extra fields to add to the service object spec
  spec: {}

ingress:
  # ingress.enabled -- Enables ingress creation for Boeing.
  enabled: false
  # ingress.annotations -- Configure annotations to add to the ingress object
  annotations: {}
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  # ingress.className -- Configures a preexisting ingress class to use.
  className: ~
  # className: boeing
  paths:
    - path: /
      pathType: Prefix
  # ingress.extraPaths -- Define complete path objects, will be inserted before regular paths. Can be useful for things like ALB Ingress Controller actions
  extraPaths: []
  # ingress.hosts -- List of hostnames to configure the ingress with
  hosts: []
  # - chart-example.local
  # ingress.tls -- List of secrets used to configure TLS for the ingress.
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# config - A key/value object containing configuration variables to configure on the boeing deployment. Will be converted to a secret and used via envFrom.
config:
  # config.existingSecret -- The name of an existing secret to use for config instead of creating a new one. Must contain keys in env format, just like below.
  existingSecret: ""

  # config.AWS_ACCESS_KEY_ID -- An AWS access key with permissions for AWS KMS, used for encryption
  AWS_ACCESS_KEY_ID: ""
  # config.AWS_REGION -- An AWS region, used to access AWS KMS
  AWS_REGION: ""
  # config.AWS_SECRET_ACCESS_KEY -- An AWS secret access key with permissions for AWS KMS, used for encryption
  AWS_SECRET_ACCESS_KEY: ""

  # config.BOEING_GCP_KMS_KEY_URI -- The URI of a Google Cloud KMS key, used for encryption
  BOEING_GCP_KMS_KEY_URI: ""

  # config.NAH_THREADINESS -- Advanced - sets the number of concurrent threads that can run in the Boeing controller
  NAH_THREADINESS: "10000"

  # config.KINM_DB_CONNECTIONS -- Advanced - the number of connections in the database pool for kinm
  KINM_DB_CONNECTIONS: "5"

  # config.GITHUB_AUTH_TOKEN -- A github PAT, used to authenticate catalog and tool pulls to avoid github ratelimiting
  GITHUB_AUTH_TOKEN: ""
  # config.BOEING_SERVER_ENABLE_AUTHENTICATION -- Enables authentication for Boeing
  BOEING_SERVER_ENABLE_AUTHENTICATION: false
  # config.BOEING_SERVER_ENABLE_REGISTRY_AUTH -- Enables authentication for the MCP registry API. When false (default), registry is accessible without authentication and returns only default catalog items with wildcard access control rules.
  BOEING_SERVER_ENABLE_REGISTRY_AUTH: false
  # config.BOEING_ENABLE_AGENTS -- Controls Boeing Agent features. Leave empty (default) to disable agents for new deployments while grandfathering in (keeping enabled) existing deployments that already have agents. Set to "true" to force-enable, or "false" to force-disable, regardless of grandfathering.
  BOEING_ENABLE_AGENTS: ""
  # config.BOEING_SERVER_UNAUTHENTICATED_RATE_LIMIT -- Rate limit for unauthenticated requests in requests per second. Tracked by source IP address. Defaults to 100.
  BOEING_SERVER_UNAUTHENTICATED_RATE_LIMIT: ""
  # config.BOEING_SERVER_AUTHENTICATED_RATE_LIMIT -- Rate limit for authenticated non-admin requests in requests per second. Tracked by user ID. Admin users are exempt. Defaults to 200.
  BOEING_SERVER_AUTHENTICATED_RATE_LIMIT: ""
  # config.BOEING_SERVER_ENCRYPTION_PROVIDER -- Configures an encryption provider for credentials in Boeing
  BOEING_SERVER_ENCRYPTION_PROVIDER: "" # "aws", "gcp", "azure", "custom"
  # config.BOEING_SERVER_ENCRYPTION_CONFIG_FILE -- The path to a file containing the encryption configuration. Only used if config.BOEING_SERVER_ENCRYPTION_PROVIDER is 'custom'
  BOEING_SERVER_ENCRYPTION_CONFIG_FILE: ""
  # config.BOEING_SERVER_ENCRYPTION_KEY -- The key to use for encryption. Only used if config.BOEING_SERVER_ENCRYPTION_PROVIDER is 'custom'. A key can be generated with `openssl rand -base64 32`
  BOEING_SERVER_ENCRYPTION_KEY: ""
  # config.BOEING_BOOTSTRAP_TOKEN -- Sets a bootstrap token. If authentication is enabled, one will be autogenerated for you if this is not set.
  BOEING_BOOTSTRAP_TOKEN: ""
  # config.BOEING_SERVER_AUTH_OWNER_EMAILS -- A comma separated list of email addresses that will have the Owner role in Boeing.
  BOEING_SERVER_AUTH_OWNER_EMAILS: ""
  # config.BOEING_SERVER_AUTH_ADMIN_EMAILS -- A comma separated list of email addresses that will have the Admin role in Boeing.
  BOEING_SERVER_AUTH_ADMIN_EMAILS: ""
  # config.BOEING_SERVER_DSN -- The DSN for your database. For example: postgres://<username>:<password>@<hostname>/<db_name>
  BOEING_SERVER_DSN: ""
  # config.BOEING_SERVER_HOSTNAME -- The hostname of your Boeing instance, including protocol
  BOEING_SERVER_HOSTNAME: ""
  # config.BOEING_SERVER_DAILY_USER_PROMPT_TOKEN_LIMIT -- The maximum number of prompt/input tokens allowed per user per day. Set <= 0 to disable this limit. Defaults to 10000000.
  BOEING_SERVER_DAILY_USER_PROMPT_TOKEN_LIMIT: ""
  # config.BOEING_SERVER_DAILY_USER_COMPLETION_TOKEN_LIMIT -- The maximum number of completion/output tokens allowed per user per day. Set <= 0 to disable this limit. Defaults to 100000.
  BOEING_SERVER_DAILY_USER_COMPLETION_TOKEN_LIMIT: ""
  # config.BOEING_SERVER_IDLE_AGENT_SHUTDOWN_HOURS -- The interval in hours to check for idle agents and shut them down. Set to -1 to disable. Defaults to 72.
  BOEING_SERVER_IDLE_AGENT_SHUTDOWN_HOURS: ""
  # config.BOEING_SERVER_SINGLE_USER_IDLE_SERVER_SHUTDOWN_HOURS -- The interval in hours to check for idle single-user MCP servers and shut them down. Set to -1 to disable. Defaults to 24.
  BOEING_SERVER_SINGLE_USER_IDLE_SERVER_SHUTDOWN_HOURS: ""
  # config.BOEING_SERVER_MULTI_USER_IDLE_SERVER_SHUTDOWN_HOURS -- The interval in hours to check for idle multi-user MCP servers and shut them down. Set to -1 to disable. Defaults to 168.
  BOEING_SERVER_MULTI_USER_IDLE_SERVER_SHUTDOWN_HOURS: ""
  # config.OPENAI_API_KEY -- An OpenAI API Key used to configure access to OpenAI models, which are the default in Boeing.
  OPENAI_API_KEY: ""
  # config.ANTHROPIC_API_KEY -- An Anthropic API Key used to configure access to Anthropic models, which can be used as the default in Boeing.
  ANTHROPIC_API_KEY: ""

  # config.BOEING_SERVER_AUDIT_LOGS_MODE -- Configures the storage backend for audit logs in Boeing. Can be 'off', 'disk', or 's3'
  BOEING_SERVER_AUDIT_LOGS_MODE: "off"
  # config.BOEING_SERVER_AUDIT_LOGS_STORE_S3BUCKET -- The name of the S3 bucket to store audit logs in. Only used if config.BOEING_SERVER_AUDIT_LOGS_MODE is 's3'
  BOEING_SERVER_AUDIT_LOGS_STORE_S3BUCKET: ""
  # config.BOEING_SERVER_AUDIT_LOGS_STORE_S3ENDPOINT -- If config.BOEING_SERVER_AUDIT_LOGS_MODE is 's3' and you are not using AWS S3, this needs to be set to the S3 api endpoint of your provider.
  BOEING_SERVER_AUDIT_LOGS_STORE_S3ENDPOINT: ""
  # config.BOEING_SERVER_AUDIT_LOGS_COMPRESS_FILE -- Whether to compress audit log files
  BOEING_SERVER_AUDIT_LOGS_COMPRESS_FILE: true
  # config.BOEING_SERVER_AUDIT_LOGS_USE_PATH_STYLE -- Whether to use path style for S3
  BOEING_SERVER_AUDIT_LOGS_USE_PATH_STYLE: false

  # config.BOEING_SERVER_MCPBASE_IMAGE -- Deploy MCP servers in the cluster using this base image. BOEING_SERVER_MCPNAMESPACE is automatically added to the secret if config.BOEING_SERVER_MCPBASE_IMAGE is set. If no tag is specified, the chart's appVersion will be used unless it starts with '0.0.0', in which case the 'main' tag will be used.
  BOEING_SERVER_MCPBASE_IMAGE: ""
  # config.BOEING_SERVER_MCPREMOTE_SHIM_BASE_IMAGE -- Deploy MCP remote shim servers in the cluster using this base image.
  BOEING_SERVER_MCPREMOTE_SHIM_BASE_IMAGE: ""
  # config.BOEING_SERVER_BOEINGBOT_AGENT_IMAGE -- Container image for the Boeingbot agent MCP server.
  BOEING_SERVER_BOEINGBOT_AGENT_IMAGE: ""
  # config.BOEING_SERVER_MCPHTTPWEBHOOK_BASE_IMAGE -- Deploy MCP HTTP webhook servers in the cluster using this base image.
  BOEING_SERVER_MCPHTTPWEBHOOK_BASE_IMAGE: ""
  # config.BOEING_SERVER_MCPCLUSTER_DOMAIN -- The cluster domain to use for MCP services. Defaults to cluster.local. Only matters if the above image is set.
  BOEING_SERVER_MCPCLUSTER_DOMAIN: ""
  # config.BOEING_SERVER_DISALLOW_LOCALHOST_MCP -- Disallow MCP servers that try to connect to localhost. Defaults to true.
  BOEING_SERVER_DISALLOW_LOCALHOST_MCP: ""
  # config.BOEING_SERVER_DISALLOW_PRIVATE_IP_MCP -- Disallow MCP servers that resolve to private IP addresses. Defaults to true.
  BOEING_SERVER_DISALLOW_PRIVATE_IP_MCP: ""
  # config.BOEING_SERVER_DISALLOW_LINK_LOCAL_MCP -- Disallow MCP servers that resolve to link-local addresses. Defaults to true.
  BOEING_SERVER_DISALLOW_LINK_LOCAL_MCP: ""
  # config.BOEING_SERVER_MCPRUNTIME_BACKEND -- The runtime backend to use for MCP servers. Can be 'docker' or 'kubernetes'. Defaults to 'docker'. Setting this to 'kubernetes' will also create the necessary service account, role and rolebinding.
  BOEING_SERVER_MCPRUNTIME_BACKEND: "kubernetes"

  # Network policy provider Helm chart configuration.
  # config.BOEING_SERVER_MCPNETWORK_POLICY_PROVIDER_CHART_REPO -- Helm repository URL for the network policy provider chart. Used when config.BOEING_SERVER_MCPNETWORK_POLICY_PROVIDER_CHART_NAME is set.
  BOEING_SERVER_MCPNETWORK_POLICY_PROVIDER_CHART_REPO: ""
  # config.BOEING_SERVER_MCPNETWORK_POLICY_PROVIDER_CHART_NAME -- Helm chart name for the network policy provider chart. Setting this enables network policy integration.
  BOEING_SERVER_MCPNETWORK_POLICY_PROVIDER_CHART_NAME: ""
  # config.BOEING_SERVER_MCPNETWORK_POLICY_PROVIDER_CHART_VERSION -- Helm chart version for the network policy provider chart.
  BOEING_SERVER_MCPNETWORK_POLICY_PROVIDER_CHART_VERSION: ""
  # config.BOEING_SERVER_MCPNETWORK_POLICY_PROVIDER_CHART_PATH -- Local filesystem path to the network policy provider chart. Setting this enables network policy integration.
  BOEING_SERVER_MCPNETWORK_POLICY_PROVIDER_CHART_PATH: ""
  # config.BOEING_SERVER_MCPNETWORK_POLICY_PROVIDER_VALUES -- YAML or JSON values blob merged into the network policy provider chart values.
  BOEING_SERVER_MCPNETWORK_POLICY_PROVIDER_VALUES: ""
  # config.BOEING_SERVER_MCPDEFAULT_DENY_ALL_EGRESS -- Default new MCP servers to allow all egress or deny all egress when a network policy provider is configured. Set to false to default to allow all egress, or true to default to deny all egress. Defaults to false.
  BOEING_SERVER_MCPDEFAULT_DENY_ALL_EGRESS: ""

  # config.BOEING_SERVER_MCPAUDIT_LOG_PERSIST_INTERVAL_SECONDS -- The interval in seconds to persist MCP audit logs to the database. Defaults to 5 seconds.
  BOEING_SERVER_MCPAUDIT_LOG_PERSIST_INTERVAL_SECONDS: ""
  # config.BOEING_SERVER_MCPAUDIT_LOGS_PERSIST_BATCH_SIZE -- The batch size to use when persisting MCP audit logs to the database. Defaults to 1000
  BOEING_SERVER_MCPAUDIT_LOGS_PERSIST_BATCH_SIZE: ""

  # config.BOEING_SERVER_DISABLE_UPDATE_CHECK -- Disable the Boeing server update check. Defaults to false.
  BOEING_SERVER_DISABLE_UPDATE_CHECK: ""
  # config.BOEING_SERVER_MCPOAUTH_CLIENT_EXPIRATION -- The expiration time for dynamically registered MCP OAuth clients. Must be a valid duration string and may include days, hours, or minutes. Defaults to 30d.
  BOEING_SERVER_MCPOAUTH_CLIENT_EXPIRATION: ""

  # config.BOEING_ARTIFACT_STORAGE_PROVIDER -- Storage provider for published workflows. Can be 's3', 'gcs', 'azure', or 'custom'. If unset, local disk storage is used.
  BOEING_ARTIFACT_STORAGE_PROVIDER: ""
  # config.BOEING_ARTIFACT_STORAGE_BUCKET -- Bucket or container name for published workflow storage.
  BOEING_ARTIFACT_STORAGE_BUCKET: ""
  # config.BOEING_ARTIFACT_S3_REGION -- Region for published workflow storage when using 's3' or 'custom'.
  BOEING_ARTIFACT_S3_REGION: ""
  # config.BOEING_ARTIFACT_S3_ACCESS_KEY_ID -- Access key ID for published workflow storage when explicit S3-compatible credentials are required.
  BOEING_ARTIFACT_S3_ACCESS_KEY_ID: ""
  # config.BOEING_ARTIFACT_S3_SECRET_ACCESS_KEY -- Secret access key for published workflow storage when explicit S3-compatible credentials are required.
  BOEING_ARTIFACT_S3_SECRET_ACCESS_KEY: ""
  # config.BOEING_ARTIFACT_S3_ENDPOINT -- Endpoint URL for published workflow storage when using 'custom' S3-compatible storage.
  BOEING_ARTIFACT_S3_ENDPOINT: ""
  # config.BOEING_ARTIFACT_GCS_SERVICE_ACCOUNT_JSON -- Inline GCS service account JSON for published workflow storage. If empty, Application Default Credentials are used.
  BOEING_ARTIFACT_GCS_SERVICE_ACCOUNT_JSON: ""
  # config.BOEING_ARTIFACT_AZURE_STORAGE_ACCOUNT -- Azure storage account name for published workflow storage.
  BOEING_ARTIFACT_AZURE_STORAGE_ACCOUNT: ""
  # config.BOEING_ARTIFACT_AZURE_TENANT_ID -- Azure tenant ID for published workflow storage when using explicit Azure credentials.
  BOEING_ARTIFACT_AZURE_TENANT_ID: ""
  # config.BOEING_ARTIFACT_AZURE_CLIENT_ID -- Azure client ID for published workflow storage when using explicit Azure credentials.
  BOEING_ARTIFACT_AZURE_CLIENT_ID: ""
  # config.BOEING_ARTIFACT_AZURE_CLIENT_SECRET -- Azure client secret for published workflow storage when using explicit Azure credentials.
  BOEING_ARTIFACT_AZURE_CLIENT_SECRET: ""

  # config.BOEING_SERVER_MCPSERVER_SEARCH_IMAGE -- The container image to use for the MCP server search functionality.
  BOEING_SERVER_MCPSERVER_SEARCH_IMAGE: ""

  # config.BOEING_DEFAULT_SKILL_REPO_URL -- The default skill repository URL. Must be a full HTTPS GitHub URL. Defaults to https://github.com/boeing-ai-gateway/skills. Only used on first-time setup (before the first owner user is created). Set to an empty string to disable.
  # BOEING_DEFAULT_SKILL_REPO_URL: ""
  # config.BOEING_DEFAULT_SKILL_REPO_REF -- The ref (branch, tag, or commit SHA) for the default skill repository. If empty, the repository's default branch is used. Only used on first-time setup.
  # BOEING_DEFAULT_SKILL_REPO_REF: ""

  # config.BOEING_SERVER_LICENSE_KEY -- A license key for Boeing Enterprise. If set here, it cannot be set in the UI.
  BOEING_SERVER_LICENSE_KEY: ""

# resources -- Resource requests and limits to use for Boeing
resources: {}

# runtimeClassName -- RuntimeClass name for Boeing server pods. This allows running Boeing with specific container runtimes (e.g., gVisor, Kata).
runtimeClassName: ""

persistence:
  # persistence.enabled -- Enables persistence using a PVC mounted at /data.
  # This also persists local published workflow artifacts when BOEING_ARTIFACT_STORAGE_PROVIDER is unset,
  # because those files are stored under /data/.local/share/boeing/published-artifacts.
  enabled: true
  # persistence.path -- The path the volume will be mounted
  path: /data
  # persistence.storageClass -- Persistent Volume storage class
  # If defined, storageClassName: <storageClass>
  # If set to "-", storageClassName: "", which disables dynamic provisioning
  # If undefined (the default) or set to null, no storageClassName spec is set, choosing the default provisioner
  storageClass: ""
  # persistence.accessModes -- Persistent Volume access modes.
  # ReadWriteOnce is appropriate for replicaCount=1.
  # ReadWriteMany is required for multi-replica deployments that rely on local artifact storage instead of object storage.
  accessModes:
    - ReadWriteOnce
  # persistence.size -- Persistent Volume size
  size: 8Gi
  existingClaim: ""

# extraVolumes -- A list of additional volumes to create
extraVolumes: []

# extraVolumeMounts -- A list of additional volume mounts to create
extraVolumeMounts: []

serviceAccount:
  # serviceAccount.create - Specifies whether a service account should be created
  create: true
  # serviceAccount.annotation - Annotations to add to the service account
  annotations: {}
  # serviceAccount.name - The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# mcpImagePullSecrets -- Configuration for creating image pull secrets for MCP containers.
# Each entry should contain registry credentials that will be used to create Kubernetes secrets.
mcpImagePullSecrets: []
# Example:
# mcpImagePullSecrets:
#   - name: "my-registry-secret"
#     registry: "my-registry.com"
#     username: "myuser"
#     password: "mypassword"
#     email: "myemail@example.com"

mcpNamespace:
  # mcpNamespace.name -- The namespace in which to deploy the MCP servers. Will only be created if config.BOEING_SERVER_MCPBASE_IMAGE image is set. Defaults to {{ .Release.Name }}-mcp
  name: ""
  # mcpNamespace.annotation - Annotations to add to the mcp server namespace. Includes ArgoCD sync wave by default.
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  # mcpNamespace.networkPolicy -- Network policy configuration for the MCP namespace
  networkPolicy:
    # mcpNamespace.networkPolicy.enabled -- Enable network policy to restrict traffic to/from MCP servers. Default is true, and is recommended for production deployments.
    enabled: true
    # mcpNamespace.networkPolicy.dnsNamespace -- The namespace where DNS pods are running. Default is kube-system. Adjust if your cluster uses a different namespace for DNS services.
    dnsNamespace: kube-system
  # mcpNamespace.podSecurity -- Pod Security Admission configuration for the MCP namespace
  podSecurity:
    # mcpNamespace.podSecurity.enabled -- Enable Pod Security Admission labels on the MCP namespace. Default is true.
    enabled: true
    # mcpNamespace.podSecurity.enforce -- Pod Security Standards level to enforce (privileged, baseline, or restricted). Default is restricted.
    enforce: restricted
    # mcpNamespace.podSecurity.enforceVersion -- Kubernetes version for the enforce policy. Default is latest.
    enforceVersion: latest
    # mcpNamespace.podSecurity.audit -- Pod Security Standards level to audit (privileged, baseline, or restricted). Default is restricted.
    audit: restricted
    # mcpNamespace.podSecurity.auditVersion -- Kubernetes version for the audit policy. Default is latest.
    auditVersion: latest
    # mcpNamespace.podSecurity.warn -- Pod Security Standards level to warn about (privileged, baseline, or restricted). Default is restricted.
    warn: restricted
    # mcpNamespace.podSecurity.warnVersion -- Kubernetes version for the warn policy. Default is latest.
    warnVersion: latest

# mcpServerDefaults -- Default Kubernetes configuration for all deployed MCP server pods
mcpServerDefaults:
  # mcpServerDefaults.affinity -- Affinity rules for MCP server pods (YAML format)
  # When set via Helm, these settings cannot be updated through the API
  affinity: {}
  # Example:
  # affinity:
  #   nodeAffinity:
  #     requiredDuringSchedulingIgnoredDuringExecution:
  #       nodeSelectorTerms:
  #       - matchExpressions:
  #         - key: workload-type
  #           operator: In
  #           values:
  #           - mcp
  #   podAntiAffinity:
  #     preferredDuringSchedulingIgnoredDuringExecution:
  #     - weight: 100
  #       podAffinityTerm:
  #         labelSelector:
  #           matchExpressions:
  #           - key: mcp-server-name
  #             operator: Exists
  #         topologyKey: kubernetes.io/hostname

  # mcpServerDefaults.tolerations -- Tolerations for MCP server pods (YAML list format)
  # When set via Helm, these settings cannot be updated through the API
  tolerations: []
  # Example:
  # tolerations:
  #   - key: "mcp-workload"
  #     operator: "Equal"
  #     value: "true"
  #     effect: "NoSchedule"
  #   - key: "node-role.kubernetes.io/mcp"
  #     operator: "Exists"
  #     effect: "NoSchedule"

  # mcpServerDefaults.resources -- Resource requests and limits for MCP server pods
  # When set via Helm, these settings cannot be updated through the API
  resources: {}
  # Example:
  # resources:
  #   requests:
  #     memory: "400Mi"
  #     cpu: "100m"
  #   limits:
  #     memory: "1Gi"
  #     cpu: "500m"

  # mcpServerDefaults.runtimeClassName -- RuntimeClass name for MCP server pods
  # This allows running MCP servers with specific container runtimes (e.g., gVisor, Kata)
  runtimeClassName: ""

  # mcpServerDefaults.storageClassName -- StorageClass name for boeingbot workspace volumes
  storageClassName: ""

  # mcpServerDefaults.boeingbotWorkspaceSize -- Size for boeingbot workspace volumes (e.g., 1Gi)
  boeingbotWorkspaceSize: ""

# nodeSelector -- Configure node selector for pod assignment
nodeSelector: {}

# tolerations -- Configure tolerations for pod scheduling
tolerations: []
# Example:
# tolerations:
#   - key: "node-role.kubernetes.io/control-plane"
#     operator: "Exists"
#     effect: "NoSchedule"
#   - key: "dedicated"
#     operator: "Equal"
#     value: "boeing"
#     effect: "NoSchedule"

# affinity -- Configure affinity rules for pod scheduling
affinity: {}
# Example:
# affinity:
#   nodeAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       nodeSelectorTerms:
#       - matchExpressions:
#         - key: node-type
#           operator: In
#           values:
#           - compute
#   podAntiAffinity:
#     preferredDuringSchedulingIgnoredDuringExecution:
#     - weight: 100
#       podAffinityTerm:
#         labelSelector:
#           matchExpressions:
#           - key: app.kubernetes.io/name
#             operator: In
#             values:
#             - boeing
#         topologyKey: kubernetes.io/hostname
